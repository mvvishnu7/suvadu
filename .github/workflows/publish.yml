name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (none to publish current version as-is)'
        required: true
        default: 'patch'
        type: choice
        options:
          - none
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci && cd ui && npm ci

      - name: Build
        run: npm run build:all

      - name: Bump version
        if: ${{ github.event.inputs.version != 'none' }}
        run: |
          git config user.email "mv.vishnu7@gmail.com"
          git config user.name "Vishnu Viswambharan"
          npm version ${{ github.event.inputs.version }} -m "Release v%s"

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit and tag
        if: ${{ github.event.inputs.version != 'none' }}
        run: git push --follow-tags
